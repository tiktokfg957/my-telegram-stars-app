<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUETAREGION70shop (тест)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #2AABEE, #1f8eb5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
        }
        h1 {
            font-size: 22px;
        }
        .price-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        .price-item {
            background: white;
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #f0f0f0;
        }
        .stars-count {
            font-weight: 700;
            font-size: 18px;
        }
        .price-value {
            font-weight: 800;
            font-size: 24px;
            color: #00a650;
            margin-right: 8px;
        }
        .buy-button {
            background: linear-gradient(145deg, #00a650, #008f45);
            border: none;
            border-radius: 40px;
            padding: 10px 22px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }
        .reviews {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .reviews-title {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 16px;
        }
        .review {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .review-icon {
            background: #00a650;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-link {
            text-align: center;
        }
        .admin-link button {
            background: transparent;
            border: 2px solid #2AABEE;
            border-radius: 40px;
            padding: 12px 24px;
            color: #2AABEE;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar">S</div>
        <h1>SUETAREGION70shop</h1>
    </div>

    <div class="price-list" id="price-list"></div>

    <div class="reviews">
        <div class="reviews-title"><span>⭐</span> Наши отзывы</div>
        <div class="review"><div class="review-icon">✓</div><div>не обман, все пришло</div></div>
        <div class="review"><div class="review-icon">✓</div><div>спасибо огромное, не обман</div></div>
        <div class="review"><div class="review-icon">✓</div><div>все пришло, спасибо!</div></div>
    </div>

    <div class="admin-link">
        <button onclick="alert('Админ-панель пока не подключена')">🔐 Админ-панель</button>
    </div>

    <script>
        alert('Скрипт запущен!'); // Проверка, выполняется ли JS

        const products = [
            { stars: 50, price: 92 },
            { stars: 100, price: 163 },
            { stars: 150, price: 234 },
            { stars: 250, price: 377 },
            { stars: 350, price: 519 },
            { stars: 500, price: 729 },
            { stars: 750, price: 1089 },
            { stars: 1000, price: 1439 }
        ];

        function renderProducts() {
            const container = document.getElementById('price-list');
            if (!container) return;
            container.innerHTML = '';
            products.forEach(p => {
                const item = document.createElement('div');
                item.className = 'price-item';
                item.innerHTML = `
                    <div class="stars-count"><span>⭐</span> ${p.stars} звёзд</div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span class="price-value">${p.price}₽</span>
                        <button class="buy-button" onclick="alert('Заказ: ${p.stars} звёзд за ${p.price}₽\nПеревод на Т-Банк +7 901 613-50-86')">
                            🛒 Купить
                        </button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        renderProducts();
    </script>
</body>
</html>
