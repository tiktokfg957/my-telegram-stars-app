<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест товаров</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f7fa; }
        .product { background: white; border-radius: 16px; padding: 16px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        button { background: #00a650; color: white; border: none; border-radius: 40px; padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>SUETAREGION70shop</h1>
    <div id="products"></div>
    <script>
        const products = [
            { stars: 50, price: 92 },
            { stars: 100, price: 163 },
            { stars: 150, price: 234 },
            { stars: 250, price: 377 },
            { stars: 350, price: 519 },
            { stars: 500, price: 729 },
            { stars: 750, price: 1089 },
            { stars: 1000, price: 1439 }
        ];
        const container = document.getElementById('products');
        products.forEach(p => {
            const div = document.createElement('div');
            div.className = 'product';
            div.innerHTML = `<span>⭐ ${p.stars} звёзд</span> <span>${p.price}₽</span> <button>Купить</button>`;
            container.appendChild(div);
        });
        alert('Скрипт выполнен!');
    </script>
</body>
</html>
