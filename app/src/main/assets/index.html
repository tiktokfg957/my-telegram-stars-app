<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUETAREGION70shek</title>
    <style>
        /* Светлая тема (по умолчанию) */
        :root {
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b70;
            --border-color: #f0f0f0;
            --accent-green: #00a650;
            --accent-blue: #2AABEE;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 15px 35px rgba(0, 166, 80, 0.15);
        }

        /* Тёмная тема (автоматически, если включена на устройстве) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-primary: #ffffff;
                --text-secondary: #a0a0a0;
                --border-color: #333333;
                --accent-green: #2ecc71;
                --accent-blue: #3b8fc2;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #2AABEE, #1f8eb5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 12px rgba(42,171,238,0.3);
        }

        .channel-info h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .price-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .price-item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }

        .price-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .stars-info {
            display: flex;
            flex-direction: column;
        }

        .stars-count {
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stars-count span {
            font-size: 22px;
        }

        .price-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .price-value {
            font-weight: 800;
            font-size: 24px;
            color: var(--accent-green);
            margin-right: 8px;
        }

        .buy-button {
            background: linear-gradient(145deg, #00a650, #008f45);
            border: none;
            border-radius: 40px;
            padding: 10px 22px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 16px rgba(0,166,80,0.3);
            cursor: pointer;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .buy-button:hover {
            background: linear-gradient(145deg, #008f45, #007a3b);
        }

        .buy-button span {
            font-size: 20px;
        }

        .channel-link {
            text-align: center;
            margin-top: 30px;
            padding: 16px 0;
        }

        .channel-button {
            background: linear-gradient(145deg, #2AABEE, #1f8eb5);
            border: none;
            border-radius: 60px;
            padding: 16px 28px;
            color: white;
            font-weight: 700;
            font-size: 20px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(42,171,238,0.3);
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }

        .channel-button span {
            font-size: 28px;
        }

        /* Адаптация для маленьких экранов */
        @media (max-width: 360px) {
            .price-item {
                flex-wrap: wrap;
                gap: 12px;
            }
            .buy-button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar">S</div>
        <div class="channel-info">
            <h1>SUETAREGION70shek</h1>
        </div>
    </div>

    <!-- Список товаров -->
    <div class="price-list" id="price-list">
        <!-- Здесь товары будут созданы скриптом -->
    </div>

    <!-- Кнопка перехода в Telegram-канал -->
    <div class="channel-link">
        <a class="channel-button" href="https://t.me/SUETAREGION70shek">
            <span>📱</span> Перейти в канал
        </a>
    </div>

    <script>
        // Массив товаров (цены из твоего первого сообщения)
        const products = [
            { stars: 50, price: 92, label: 'Популярный' },
            { stars: 100, price: 163, label: 'Выгодно' },
            { stars: 150, price: 234, label: 'Стандарт' },
            { stars: 250, price: 377, label: 'Для блогера' },
            { stars: 350, price: 519, label: 'Премиум' },
            { stars: 500, price: 729, label: 'Супер хит' },
            { stars: 750, price: 1089, label: 'VIP' },
            { stars: 1000, price: 1439, label: 'Легендарный' }
        ];

        // Функция для создания карточек товаров
        function renderProducts() {
            const container = document.getElementById('price-list');
            container.innerHTML = '';
            products.forEach(p => {
                const item = document.createElement('div');
                item.className = 'price-item';
                // При нажатии на кнопку открывается Telegram с предзаполненным сообщением
                const telegramLink = `https://t.me/SUETAREGION70shek?text=Хочу%20${p.stars}%20звёзд%20за%20${p.price}₽`;
                item.innerHTML = `
                    <div class="stars-info">
                        <div class="stars-count"><span>⭐</span> ${p.stars} звёзд</div>
                        <div class="price-label">${p.label}</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span class="price-value">${p.price}₽</span>
                        <a class="buy-button" href="${telegramLink}" target="_blank">
                            <span>🛒</span> Купить
                        </a>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // Запускаем отрисовку при загрузке страницы
        renderProducts();

        // Можно добавить простую проверку, что скрипт работает
        console.log('Приложение загружено');
    </script>
</body>
</html>
