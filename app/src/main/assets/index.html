<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUETAREGION70shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Стили (полные, как в предыдущем сообщении) */
        :root {
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b70;
            --border-color: #f0f0f0;
            --accent-green: #00a650;
            --accent-blue: #2AABEE;
            --accent-yellow: #f39c12;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 15px 35px rgba(0, 166, 80, 0.15);
            --overlay-bg: rgba(0, 0, 0, 0.5);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-primary: #ffffff;
                --text-secondary: #a0a0a0;
                --border-color: #333333;
                --accent-green: #2ecc71;
                --accent-blue: #3b8fc2;
                --accent-yellow: #f1c40f;
                --overlay-bg: rgba(0, 0, 0, 0.7);
            }
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #2AABEE, #1f8eb5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 12px rgba(42,171,238,0.3);
        }
        .channel-info h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .price-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        .price-item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }
        .price-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        .stars-info {
            display: flex;
            flex-direction: column;
        }
        .stars-count {
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stars-count span {
            font-size: 22px;
        }
        .price-label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .price-value {
            font-weight: 800;
            font-size: 24px;
            color: var(--accent-green);
            margin-right: 8px;
        }
        .buy-button {
            background: linear-gradient(145deg, #00a650, #008f45);
            border: none;
            border-radius: 40px;
            padding: 10px 22px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 16px rgba(0,166,80,0.3);
            cursor: pointer;
        }
        .buy-button:hover {
            background: linear-gradient(145deg, #008f45, #007a3b);
        }
        .reviews {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
        }
        .reviews-title {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .review {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .review-icon {
            background: var(--accent-green);
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-link {
            text-align: center;
            margin: 20px 0 10px;
        }
        .admin-link button {
            background: transparent;
            border: 2px solid var(--accent-blue);
            border-radius: 40px;
            padding: 12px 24px;
            color: var(--accent-blue);
            font-weight: 700;
            cursor: pointer;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            z-index: 999;
        }
        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        .popup-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 24px;
            cursor: pointer;
        }
        .popup-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
        }
        .popup-detail {
            background: var(--bg-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .popup-stars {
            font-size: 22px;
            font-weight: 700;
        }
        .popup-price {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-green);
            margin: 8px 0;
        }
        .popup-receiver {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 40px;
            border: 1px dashed var(--accent-blue);
            margin: 12px 0;
        }
        .popup-receiver span {
            font-weight: 600;
            color: var(--accent-blue);
        }
        .popup-input {
            margin: 16px 0;
            text-align: left;
        }
        .popup-input label {
            font-weight: 600;
            font-size: 14px;
            display: block;
            margin-bottom: 6px;
        }
        .popup-input input {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-primary);
        }
        .popup-file {
            margin: 16px 0;
            text-align: left;
        }
        .popup-file label {
            font-weight: 600;
            font-size: 14px;
            display: block;
            margin-bottom: 6px;
        }
        .popup-file input {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
        }
        .waiting-status {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 16px;
            margin: 16px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .hidden {
            display: none;
        }
        .popup-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .popup-button {
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }
        .popup-button.primary {
            background: linear-gradient(145deg, #00a650, #008f45);
            color: white;
        }
        .popup-button.secondary {
            background: transparent;
            border: 2px solid var(--accent-green);
            color: var(--accent-green);
        }
        .popup-button.history {
            background: var(--accent-blue);
            color: white;
        }
        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 2000;
            overflow-y: auto;
            padding: 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .admin-login {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
        }
        .admin-login input {
            width: 80%;
            padding: 14px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
        }
        .order-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
        }
        .order-status {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-approved { background: #d4edda; color: #155724; }
        .status-rejected { background: #f8d7da; color: #721c24; }
        .status-sent { background: #cce5ff; color: #004085; }
        .order-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .order-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }
        .btn-approve { background: #28a745; color: white; }
        .btn-reject { background: #dc3545; color: white; }
        .btn-sent { background: #007bff; color: white; }
        .btn-delete { background: #6c757d; color: white; }
        .receipt-link {
            display: inline-block;
            margin-top: 8px;
            color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar">S</div>
        <div class="channel-info">
            <h1>SUETAREGION70shop</h1>
        </div>
    </div>

    <div class="price-list" id="price-list"></div>

    <div class="reviews">
        <div class="reviews-title"><span>⭐</span> Наши отзывы</div>
        <div class="review"><div class="review-icon">✓</div><div class="review-text"><strong>не обман</strong>, все пришло</div></div>
        <div class="review"><div class="review-icon">✓</div><div class="review-text"><strong>спасибо огромное</strong>, не обман</div></div>
        <div class="review"><div class="review-icon">✓</div><div class="review-text">все пришло, спасибо!</div></div>
    </div>

    <div class="admin-link">
        <button onclick="showAdminLogin()">🔐 Админ-панель</button>
    </div>

    <div class="overlay" id="overlay" onclick="closePopup()"></div>
    <div class="popup" id="popup">
        <div class="popup-close" onclick="closePopup()">×</div>
        <div class="popup-header">Оформление заказа</div>
        <div class="popup-detail">
            <div class="popup-stars" id="popupStars">50 звёзд</div>
            <div class="popup-price" id="popupPrice">92₽</div>
            <div class="popup-receiver">
                <span>Т-Банк</span><br>+7 901 613-50-86
            </div>
        </div>
        <div class="popup-input">
            <label>Telegram username:</label>
            <input type="text" id="tgUsername" placeholder="@username">
        </div>
        <div class="popup-file">
            <label>Загрузить чек:</label>
            <input type="file" id="receiptFile" accept="image/*">
        </div>
        <div id="waitingBlock" class="waiting-status hidden">
            <span>⏳</span> Ожидайте подтверждение
        </div>
        <div class="popup-buttons" id="popupButtons">
            <button class="popup-button primary" onclick="submitOrder()">Отправить заказ</button>
            <button class="popup-button secondary" onclick="closePopup()">Вернуться в меню</button>
            <button class="popup-button history" onclick="showHistory()">История</button>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h2>Админ-панель</h2>
            <button class="popup-close" onclick="hideAdminPanel()">×</button>
        </div>
        <div id="adminLoginForm" class="admin-login">
            <input type="text" id="adminLogin" placeholder="Логин" value="admin">
            <input type="password" id="adminPassword" placeholder="Пароль">
            <button onclick="adminLogin()">Войти</button>
        </div>
        <div id="adminContent" style="display: none;">
            <button onclick="loadOrders()">Обновить заказы</button>
            <div id="ordersList"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qzdrmzgpojwciniuimcs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_SmfssQWcetmpRfesu5cx5Q_D63Oasx-';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentStars = 0;
        let currentPrice = 0;
        let selectedFile = null;
        const ADMIN_PASSWORD = 'sueta70admin';

        const products = [
            { stars: 50, price: 92, label: 'Популярный' },
            { stars: 100, price: 163, label: 'Выгодно' },
            { stars: 150, price: 234, label: 'Стандарт' },
            { stars: 250, price: 377, label: 'Для блогера' },
            { stars: 350, price: 519, label: 'Премиум' },
            { stars: 500, price: 729, label: 'Супер хит' },
            { stars: 750, price: 1089, label: 'VIP' },
            { stars: 1000, price: 1439, label: 'Легендарный' }
        ];

        function renderProducts() {
            const container = document.getElementById('price-list');
            container.innerHTML = '';
            products.forEach(p => {
                const item = document.createElement('div');
                item.className = 'price-item';
                item.innerHTML = `
                    <div class="stars-info">
                        <div class="stars-count"><span>⭐</span> ${p.stars} звёзд</div>
                        <div class="price-label">${p.label}</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span class="price-value">${p.price}₽</span>
                        <button class="buy-button" onclick="openPopup(${p.stars}, ${p.price})">
                            <span>🛒</span> Купить
                        </button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function openPopup(stars, price) {
            currentStars = stars;
            currentPrice = price;
            document.getElementById('popupStars').innerText = stars + ' звёзд';
            document.getElementById('popupPrice').innerText = price + '₽';
            document.getElementById('tgUsername').value = '';
            document.getElementById('receiptFile').value = '';
            document.getElementById('waitingBlock').classList.add('hidden');
            document.getElementById('popupButtons').style.display = 'flex';
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('popup').style.display = 'block';
        }

        function closePopup() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('popup').style.display = 'none';
        }

        document.getElementById('receiptFile').addEventListener('change', function(e) {
            selectedFile = e.target.files[0] || null;
        });

        async function submitOrder() {
            const username = document.getElementById('tgUsername').value.trim();
            if (!username) { alert('Введите username'); return; }
            if (!selectedFile) { alert('Выберите чек'); return; }

            document.getElementById('popupButtons').style.display = 'none';
            document.getElementById('waitingBlock').classList.remove('hidden');

            try {
                const fileExt = selectedFile.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                const { error: uploadError } = await supabase.storage
                    .from('receipts')
                    .upload(fileName, selectedFile);
                if (uploadError) throw uploadError;

                const { data: urlData } = supabase.storage
                    .from('receipts')
                    .getPublicUrl(fileName);
                const receiptUrl = urlData.publicUrl;

                const { error: insertError } = await supabase
                    .from('orders')
                    .insert({
                        user_name: username,
                        stars_count: currentStars,
                        amount: currentPrice,
                        receipt_url: receiptUrl,
                        status: 'pending'
                    });
                if (insertError) throw insertError;

                alert('Заказ отправлен!');
            } catch (error) {
                alert('Ошибка: ' + error.message);
                document.getElementById('popupButtons').style.display = 'flex';
                document.getElementById('waitingBlock').classList.add('hidden');
            }
        }

        function showHistory() {
            alert('Функция в разработке');
            closePopup();
        }

        function showAdminLogin() {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminLoginForm').style.display = 'flex';
            document.getElementById('adminContent').style.display = 'none';
        }

        function hideAdminPanel() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        function adminLogin() {
            const pass = document.getElementById('adminPassword').value;
            if (pass === ADMIN_PASSWORD) {
                document.getElementById('adminLoginForm').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadOrders();
            } else {
                alert('Неверный пароль');
            }
        }

        async function loadOrders() {
            const { data, error } = await supabase
                .from('orders')
                .select('*')
                .order('created_at', { ascending: false });
            if (error) { alert(error.message); return; }
            renderOrders(data);
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersList');
            container.innerHTML = '';
            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = 'order-card';
                let statusClass = '';
                let statusText = '';
                switch (order.status) {
                    case 'pending': statusClass = 'status-pending'; statusText = '⏳ Ожидание'; break;
                    case 'approved': statusClass = 'status-approved'; statusText = '✅ Одобрено'; break;
                    case 'rejected': statusClass = 'status-rejected'; statusText = '❌ Отказ'; break;
                    case 'sent': statusClass = 'status-sent'; statusText = '⭐ Отправлено'; break;
                }
                card.innerHTML = `
                    <div class="order-header">
                        <span>#${order.id}</span>
                        <span class="order-status ${statusClass}">${statusText}</span>
                    </div>
                    <div>${order.stars_count} звёзд — ${order.amount}₽</div>
                    <div>👤 ${order.user_name}</div>
                    <div>🕒 ${new Date(order.created_at).toLocaleString()}</div>
                    ${order.receipt_url ? `<a href="${order.receipt_url}" target="_blank" class="receipt-link">📎 Чек</a>` : ''}
                    <div class="order-actions">
                        <button class="btn-approve" onclick="updateOrder(${order.id}, 'approved')">Одобрить</button>
                        <button class="btn-reject" onclick="updateOrder(${order.id}, 'rejected')">Отказать</button>
                        <button class="btn-sent" onclick="updateOrder(${order.id}, 'sent')">Отправлено</button>
                        <button class="btn-delete" onclick="deleteOrder(${order.id})">Удалить</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function updateOrder(id, status) {
            await supabase.from('orders').update({ status }).eq('id', id);
            loadOrders();
        }

        async function deleteOrder(id) {
            if (confirm('Удалить заказ?')) {
                await supabase.from('orders').delete().eq('id', id);
                loadOrders();
            }
        }

        renderProducts();
    </script>
</body>
</html>
