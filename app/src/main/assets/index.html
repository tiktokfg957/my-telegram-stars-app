<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Звёздный кликер</title>
    <style>
        :root {
            --bg: #0a0f1e;
            --card: #1a1f33;
            --text: #ffffff;
            --star: #ffd966;
            --star-glow: #ffb347;
            --btn-bg: #2AABEE;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            background: var(--card);
            border-radius: 48px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #334155;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 16px;
            color: var(--star);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        .star-count {
            font-size: 56px;
            font-weight: 800;
            margin: 20px 0;
            background: linear-gradient(145deg, #2a2f4f, #1e2338);
            padding: 20px;
            border-radius: 80px;
            border: 2px solid var(--star);
            color: var(--star);
            text-shadow: 0 0 15px gold;
        }
        .star-button {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            background: radial-gradient(circle at 30% 30%, #ffecaa, #f5b042);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 20px 30px rgba(255, 215, 0, 0.4), inset 0 -10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            border: 4px solid #ffdb7e;
        }
        .star-button:active {
            transform: scale(0.95);
            box-shadow: 0 10px 15px rgba(255, 215, 0, 0.6), inset 0 -5px 10px rgba(0,0,0,0.3);
        }
        .reset-button {
            background: transparent;
            border: 2px solid #ff6b6b;
            color: #ff6b6b;
            font-size: 18px;
            padding: 12px 30px;
            border-radius: 40px;
            margin-top: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reset-button:hover {
            background: #ff6b6b;
            color: white;
        }
        .footer {
            margin-top: 24px;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Звёздный кликер ✨</h1>
        <div class="star-count" id="score">0</div>
        <div class="star-button" id="clickButton">
            ⭐
        </div>
        <button class="reset-button" id="resetButton">Сбросить звёзды</button>
        <div class="footer">Нажимай на звезду, копи баллы</div>
    </div>

    <script>
        // Простой звук (если не работает – игнорируем)
        function playClickSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 800;
                gainNode.gain.value = 0.1;
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch (e) {
                console.log('Звук не поддерживается');
            }
        }

        // Загружаем счёт
        let stars = localStorage.getItem('clickerStars');
        if (stars === null) {
            stars = 0;
        } else {
            stars = parseInt(stars);
            if (isNaN(stars)) stars = 0;
        }

        const scoreElement = document.getElementById('score');
        scoreElement.textContent = stars;

        // Назначаем обработчик клика напрямую
        const starButton = document.getElementById('clickButton');
        starButton.onclick = function() {
            // Отладочное сообщение
            alert('Клик сработал! Текущий счёт: ' + stars);

            stars++;
            scoreElement.textContent = stars;
            localStorage.setItem('clickerStars', stars);
            playClickSound();

            // Анимация
            this.style.transform = 'scale(0.95)';
            setTimeout(() => this.style.transform = 'scale(1)', 100);
        };

        // Сброс
        document.getElementById('resetButton').onclick = function() {
            if (confirm('Сбросить все звёзды?')) {
                stars = 0;
                scoreElement.textContent = stars;
                localStorage.setItem('clickerStars', stars);
            }
        };

        // Пульсация каждые 5 секунд
        setInterval(() => {
            starButton.style.transform = 'scale(1.02)';
            setTimeout(() => starButton.style.transform = 'scale(1)', 200);
        }, 5000);
    </script>
</body>
</html>
