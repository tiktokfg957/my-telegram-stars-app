<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUETAREGION70shek</title>
    <style>
        :root {
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b70;
            --border-color: #f0f0f0;
            --accent-green: #00a650;
            --accent-blue: #2AABEE;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 15px 35px rgba(0, 166, 80, 0.15);
            --overlay-bg: rgba(0, 0, 0, 0.5);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-primary: #ffffff;
                --text-secondary: #a0a0a0;
                --border-color: #333333;
                --accent-green: #2ecc71;
                --accent-blue: #3b8fc2;
                --overlay-bg: rgba(0, 0, 0, 0.7);
            }
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #2AABEE, #1f8eb5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 12px rgba(42,171,238,0.3);
        }
        .channel-info h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .price-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        .price-item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }
        .price-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        .stars-info {
            display: flex;
            flex-direction: column;
        }
        .stars-count {
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stars-count span {
            font-size: 22px;
        }
        .price-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .price-value {
            font-weight: 800;
            font-size: 24px;
            color: var(--accent-green);
            margin-right: 8px;
        }
        .buy-button {
            background: linear-gradient(145deg, #00a650, #008f45);
            border: none;
            border-radius: 40px;
            padding: 10px 22px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 16px rgba(0,166,80,0.3);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .buy-button:hover {
            background: linear-gradient(145deg, #008f45, #007a3b);
        }
        .buy-button span {
            font-size: 20px;
        }
        .channel-link {
            text-align: center;
            margin-top: 30px;
            padding: 16px 0;
        }
        .channel-button {
            background: linear-gradient(145deg, #2AABEE, #1f8eb5);
            border: none;
            border-radius: 60px;
            padding: 16px 28px;
            color: white;
            font-weight: 700;
            font-size: 20px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(42,171,238,0.3);
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }
        .channel-button span {
            font-size: 28px;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            z-index: 999;
        }
        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            z-index: 1000;
            color: var(--text-primary);
        }
        .popup-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .popup-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
        }
        .popup-detail {
            background: var(--bg-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .popup-stars {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .popup-price {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-green);
            margin: 8px 0;
        }
        .popup-receiver {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 40px;
            border: 1px dashed var(--accent-blue);
            margin: 12px 0;
            font-size: 16px;
        }
        .popup-receiver span {
            font-weight: 600;
            color: var(--accent-blue);
        }
        .popup-order-id {
            font-size: 18px;
            margin: 16px 0;
            padding: 8px;
            background: var(--accent-yellow, #fff3cd);
            border-radius: 30px;
            color: #856404;
            font-weight: 600;
        }
        .popup-button {
            background: linear-gradient(145deg, #00a650, #008f45);
            border: none;
            border-radius: 40px;
            padding: 16px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 8px 16px rgba(0,166,80,0.3);
        }
        .popup-button:hover {
            background: linear-gradient(145deg, #008f45, #007a3b);
        }
        @media (max-width: 360px) {
            .price-item {
                flex-wrap: wrap;
                gap: 12px;
            }
            .buy-button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar">S</div>
        <div class="channel-info">
            <h1>SUETAREGION70shek</h1>
        </div>
    </div>

    <div class="price-list" id="price-list">
        <!-- товары будут созданы скриптом -->
    </div>

    <div class="channel-link">
        <a class="channel-button" href="https://t.me/SUETAREGION70shek">
            <span>📱</span> Перейти в канал
        </a>
    </div>

    <!-- Затемнение фона -->
    <div class="overlay" id="overlay" onclick="closePopup()"></div>

    <!-- Всплывающее окно с реквизитами -->
    <div class="popup" id="popup">
        <div class="popup-close" onclick="closePopup()">×</div>
        <div class="popup-header">Оплата заказа</div>
        <div class="popup-detail">
            <div class="popup-stars" id="popupStars">50 звёзд</div>
            <div class="popup-price" id="popupPrice">92₽</div>
            <div class="popup-receiver">
                <span>Т-Банк</span><br>+7 901 613-50-86
            </div>
            <div class="popup-order-id" id="popupOrderId">#34243</div>
        </div>
        <button class="popup-button" id="confirmButton">Подтвердить оплату</button>
    </div>

    <script>
        const products = [
            { stars: 50, price: 92, label: 'Популярный' },
            { stars: 100, price: 163, label: 'Выгодно' },
            { stars: 150, price: 234, label: 'Стандарт' },
            { stars: 250, price: 377, label: 'Для блогера' },
            { stars: 350, price: 519, label: 'Премиум' },
            { stars: 500, price: 729, label: 'Супер хит' },
            { stars: 750, price: 1089, label: 'VIP' },
            { stars: 1000, price: 1439, label: 'Легендарный' }
        ];

        let currentStars = 0;
        let currentPrice = 0;
        let currentOrderId = '';

        // Генератор случайного 5-значного числа (можно больше)
        function generateOrderId() {
            return Math.floor(10000 + Math.random() * 90000); // от 10000 до 99999
        }

        // Отрисовка товаров
        function renderProducts() {
            const container = document.getElementById('price-list');
            container.innerHTML = '';
            products.forEach(p => {
                const item = document.createElement('div');
                item.className = 'price-item';
                item.innerHTML = `
                    <div class="stars-info">
                        <div class="stars-count"><span>⭐</span> ${p.stars} звёзд</div>
                        <div class="price-label">${p.label}</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span class="price-value">${p.price}₽</span>
                        <button class="buy-button" onclick="openPopup(${p.stars}, ${p.price})">
                            <span>🛒</span> Купить
                        </button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // Открыть попап с данными товара
        function openPopup(stars, price) {
            currentStars = stars;
            currentPrice = price;
            currentOrderId = generateOrderId();

            document.getElementById('popupStars').innerText = stars + ' звёзд';
            document.getElementById('popupPrice').innerText = price + '₽';
            document.getElementById('popupOrderId').innerText = '#' + currentOrderId;

            document.getElementById('overlay').style.display = 'block';
            document.getElementById('popup').style.display = 'block';
        }

        function closePopup() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('popup').style.display = 'none';
        }

        // Обработчик кнопки "Подтвердить оплату"
        document.getElementById('confirmButton').addEventListener('click', function() {
            // Формируем текст сообщения
            const message = `купил ${currentStars} звёзд за ${currentPrice}₽ #${currentOrderId}`;
            // Кодируем для URL
            const encodedMessage = encodeURIComponent(message);
            // Ссылка на Telegram-канал с сообщением
            const telegramUrl = `https://t.me/SUETAREGION70shek?text=${encodedMessage}`;
            // Открываем ссылку (Telegram должен перехватить)
            window.open(telegramUrl, '_blank');
            // Закрываем попап
            closePopup();
        });

        // Инициализация
        renderProducts();
    </script>
</body>
</html>
